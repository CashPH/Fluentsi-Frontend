<div class="login-container">
<nav class="navbar">
    <div class="nav-left">
    <img src="/fluentsi-front/public/logo.png" alt="Fluent Si Logo" class="logo">
    <ul class="nav-links">
        <li><a href="#">Inicio</a></li>
    <li><a href="#">Cursos</a></li>
    </ul>
    </div>
    <button class="nav-login-btn">Log in</button>
</nav>

<main class="main-content">
    <div class="login-card">
    <div class="card-header">
        <h2>Inicia Sesión</h2>
    </div>
    
    <p class="subtitle">Ingresa tus datos para iniciar sesión</p>

    <img src="/fluentsi-front/public/monito.png" alt="Mascot" class="mascot">

    <form>
        <div class="input-group">
        <label for="username">Correo electrónico o Usuario</label>
        <input type="text" id="username" name="username">
        </div>

        <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password">
        </div>

        <p class="register-text">¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>

        <button type="submit" class="submit-btn">Entrar</button>
    </form>
    </div>
</main>
</div>
