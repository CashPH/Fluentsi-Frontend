<div class="dashboard-container">
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/logo.png" alt="Logo" class="logo" />
            <ul class="nav-links">
                <li><a href="#" class="active">Inicio</a></li>
                <li><a href="#">Mi agenda</a></li>
                <li><a href="#">Cursos</a></li>
                <li><a href="#">Revisiones</a></li>
            </ul>
        </div>
        <img src="assets/monito.png" alt="Mascot" class="nav-mascot" />
    </nav>

    <main class="main-content">
        <h1 class="welcome-title">Bienvenido &lt;Nombre Instructor&gt;</h1>

        <div class="dashboard-layout">
            <aside class="side-panel">
                <h3 class="panel-title">Mi Panel</h3>

                <div class="stat-card gray-card">
                    <div class="stat-header">
                        <span class="icon">👤</span>
                        <span class="number">8</span>
                    </div>
                    <p>Alumnos Asignados</p>
                </div>

                <div class="stat-card yellow-card">
                    <div class="stat-header">
                        <span class="icon">📅</span>
                        <span class="number">4</span>
                    </div>
                    <p>Por revisar</p>
                </div>
            </aside>

            <section class="main-panel">
                <div class="next-session-card">
                    <div class="card-header">
                        <h3>Siguiente Sesión</h3>
                    </div>

                    <div class="session-body">
                        <img src="assets/alumna.jpg" alt="Alumna" class="student-avatar" />

                        <div class="session-info">
                            <h2>Clase con &lt;Nombre Alumna&gt;</h2>
                            <p class="objective">Objetivo: Entrevista</p>
                            <span class="level-badge">B2</span>
                        </div>

                        <div class="session-actions">
                            <span class="clock-icon">⏰</span>
                            <button class="start-btn">Iniciar Sesión</button>
                        </div>
                    </div>
                </div>

                <div class="quick-access-section">
                    <h3 class="quick-title">Accesos Rápidos</h3>
                    <div class="quick-cards-container">
                        <div class="quick-card">
                            <h4>Agenda Semanal</h4>
                            <div class="quick-card-bottom">
                                <span class="arrow">→</span>
                                <span class="icon">📅</span>
                            </div>
                        </div>

                        <div class="quick-card">
                            <h4>Mis Cursos</h4>
                            <div class="quick-card-bottom">
                                <span class="arrow">→</span>
                                <span class="icon">📘</span>
                            </div>
                        </div>

                        <div class="quick-card">
                            <h4>Evaluaciones</h4>
                            <div class="quick-card-bottom">
                                <span class="arrow">→</span>
                                <span class="icon">📝</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>
